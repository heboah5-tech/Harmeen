providers = ["node"]

[phases.setup]
nixPkgs = [
  "nodejs_20",
  "chromium",
  "nss",
  "freetype",
  "harfbuzz",
  "ca-certificates",
  "fontconfig",
]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "node ./dist/index.cjs"

[variables]
NODE_ENV = "production"
CHROMIUM_PATH = "/root/.nix-profile/bin/chromium"
